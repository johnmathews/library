# Library — production-shaped compose file (see docs/deployment.md).
#
# Configuration comes from a `.env` file next to this file (copy
# `.env.example`); every value has a working default, so `docker compose up`
# works without one. Memory limits assume a Proxmox LXC with ~8 GB (the
# embedder alone needs 6 GB for bge-m3) — tune them to your container.
#
# Named volumes:
#   pgdata        Postgres data directory (all metadata, users, job queue)
#   library_data  /data — content-addressed originals + derived artifacts
# Both need backing up; see docs/deployment.md §1.6.

services:
  db:
    # Postgres 17 + pgvector (semantic search embeddings live in
    # document_chunks). Pinned: upgrade deliberately, not on `compose pull`.
    # C.UTF-8 keeps text ordering byte-wise and libc-independent — it matches
    # the original alpine cluster's C collation, so reusing an existing pgdata
    # volume under this image is safe (no glibc collation-version mismatch).
    # Only applied on a FRESH volume; an existing cluster keeps its collation.
    image: pgvector/pgvector:pg17@sha256:dd467f03ca5c5581222490e5217e48a262864ccb659be559f8491bbafdc97da0
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
      POSTGRES_DB: library
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local embedding sidecar: serves bge-m3 (1024-dim) over HTTP for semantic
  # search. CPU inference; downloads the model (~2 GB) into embedder_cache on
  # first start. Memory-capped — budget for it on the host (docs/deployment.md).
  embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7@sha256:22eac176ead3eb7008c672123b05331347e1a86661a7f27f3f6550dbe31ff96c
    # bge-m3 needs ~6 GB headroom; a large batch OOM-kills it below that. Cap the
    # batch so peak memory is bounded (matches the proxmox-setup prod template).
    command: ["--model-id", "BAAI/bge-m3", "--auto-truncate", "--max-batch-tokens", "2048"]
    restart: unless-stopped
    mem_limit: 6g
    volumes:
      - embedder_cache:/data

  # One-shot: runs alembic migrations, then exits. api/worker wait for it.
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file:
      - path: .env
        required: false
    environment:
      LIBRARY_DATABASE_URL: ${LIBRARY_DATABASE_URL:-postgresql+asyncpg://library:library@db:5432/library}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      LIBRARY_DATABASE_URL: ${LIBRARY_DATABASE_URL:-postgresql+asyncpg://library:library@db:5432/library}
      LIBRARY_DATA_DIR: /data
      LIBRARY_EMBEDDING_SERVICE_URL: ${LIBRARY_EMBEDDING_SERVICE_URL:-http://embedder:80}
      # Secure cookies (the default) require HTTPS via a reverse proxy.
      # Set LIBRARY_COOKIE_SECURE=false in .env only for plain-HTTP testing.
      LIBRARY_COOKIE_SECURE: ${LIBRARY_COOKIE_SECURE:-true}
    volumes:
      - library_data:/data
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      embedder:
        condition: service_started
    healthcheck:
      # curl/wget are not present in slim images; use the stdlib instead.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: .
    command: ["python", "-m", "library.worker"]
    restart: unless-stopped
    # OCR (tesseract/ghostscript subprocesses, RapidOCR ONNX inference)
    # peaks well above the API's footprint.
    mem_limit: 2g
    env_file:
      - path: .env
        required: false
    environment:
      LIBRARY_DATABASE_URL: ${LIBRARY_DATABASE_URL:-postgresql+asyncpg://library:library@db:5432/library}
      LIBRARY_DATA_DIR: /data
      # Consume folder watcher: files dropped here are ingested automatically.
      # Lives inside the /data volume; in production bind-mount your
      # Syncthing-synced scan folder over it (and set
      # LIBRARY_CONSUME_FORCE_POLLING=true if that mount is NFS/SMB).
      # Archives land in siblings of this dir (here: /data/consumed and
      # /data/failed) — override with LIBRARY_CONSUMED_DIR / LIBRARY_FAILED_DIR
      # (via .env) if the consume dir is its own mount root, or the defaults
      # resolve to ephemeral container storage.
      # See docs/ingestion.md, "Consume folder".
      LIBRARY_CONSUME_DIR: ${LIBRARY_CONSUME_DIR:-/data/consume}
      LIBRARY_EMBEDDING_SERVICE_URL: ${LIBRARY_EMBEDDING_SERVICE_URL:-http://embedder:80}
    volumes:
      - library_data:/data
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      embedder:
        condition: service_started
    healthcheck:
      # The worker serves no HTTP; healthy = the app imports and the
      # database (which carries the job queue) is reachable.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import psycopg; from library.config import get_settings; from library.jobs import procrastinate_conninfo; psycopg.connect(procrastinate_conninfo(get_settings().database_url), connect_timeout=5).close()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
  library_data:
  embedder_cache:

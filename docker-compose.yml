services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
      POSTGRES_DB: library
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      LIBRARY_DATABASE_URL: postgresql+asyncpg://library:library@db:5432/library
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      LIBRARY_DATABASE_URL: postgresql+asyncpg://library:library@db:5432/library
      LIBRARY_DATA_DIR: /data
    volumes:
      - library_data:/data
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # curl/wget are not present in slim images; use the stdlib instead.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: .
    command: ["python", "-m", "library.worker"]
    environment:
      LIBRARY_DATABASE_URL: postgresql+asyncpg://library:library@db:5432/library
      LIBRARY_DATA_DIR: /data
      # Consume folder watcher: files dropped here are ingested automatically.
      # Lives inside the /data volume; in production bind-mount your
      # Syncthing-synced scan folder over it (and set
      # LIBRARY_CONSUME_FORCE_POLLING=true if that mount is NFS/SMB).
      # See docs/ingestion.md, "Consume folder".
      LIBRARY_CONSUME_DIR: /data/consume
    volumes:
      - library_data:/data
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  library_data:

name: CI

on:
  push:
    # Every branch, so feature work is gated by the full pipeline (incl. e2e)
    # before it reaches main — not only after the merge lands.
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# One in-flight run per ref; new pushes cancel the previous run so the
# now-every-branch trigger doesn't stack up CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # update the sticky coverage comment on PRs
    steps:
      - uses: actions/checkout@v7
      # Full version: astral-sh/setup-uv publishes no floating `v8` major tag.
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install OCR system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-nld tesseract-ocr-eng ghostscript unpaper
      - name: Install dependencies
        run: uv sync --locked
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test with coverage
        run: |
          uv run coverage run -m pytest
          # Generate the HTML report BEFORE the fail-under gate below, so the
          # artifact is still produced (and uploaded) when coverage drops below
          # threshold — that's exactly when you want to see what's uncovered.
          uv run coverage html
          # Machine-readable totals (totals.percent_covered) for the unified
          # coverage summary the `build` job bakes into the image via
          # scripts/coverage_summary.py. Emitted before the fail-under gate so it
          # exists even when coverage dips below threshold.
          uv run coverage json -o coverage.json
          # Surface the report on the run's summary page and in a file the
          # PR-comment step can reuse.
          {
            echo '## Backend coverage'
            echo
            uv run coverage report --format=markdown
          } | tee coverage.md >> "$GITHUB_STEP_SUMMARY"
          # Enforce the fail-under gate last, after artifacts are produced.
          uv run coverage report
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-html
          path: htmlcov/
          # When an earlier step (e.g. lint) fails, coverage never runs and
          # there's no htmlcov/ — don't warn about the expected absence.
          if-no-files-found: ignore
      - name: Upload backend coverage JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-json
          path: coverage.json
          if-no-files-found: ignore
      - name: Coverage PR comment
        if: success() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: backend-coverage
          path: coverage.md

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # update the sticky coverage comment on PRs
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Test with coverage
        run: npm run test:coverage
      - name: Coverage summary
        if: always()
        run: |
          mkdir -p coverage
          node scripts/coverage-summary.mjs | tee coverage/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Coverage PR comment
        if: success() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: frontend-coverage
          path: frontend/coverage/summary.md
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-html
          path: frontend/coverage/
      - name: Build
        run: npm run build
      - name: Check the build is free of GOV.UK residue
        run: npm run check:assets

  e2e:
    # Deliberately NOT gated on backend/frontend: e2e builds its own stack image
    # and shares no artifacts with them, so it runs fully in parallel to cut total
    # wall-clock. The deploy gate stays safe — `promote` still needs all of
    # backend/frontend/e2e/compose-smoke to pass (see its `needs` below).
    runs-on: ubuntu-latest
    env:
      # Both compose files for every compose invocation (up/exec/logs/down).
      COMPOSE_FILE: docker-compose.yml:frontend/e2e/compose.e2e.yml
      E2E_BASE_URL: http://localhost:4173
      # The admin-gating spec needs a second, admin-role login alongside the
      # normal `e2e` user (created below).
      E2E_ADMIN_USERNAME: e2e-admin
      E2E_ADMIN_PASSWORD: e2e-admin-password-123
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      # Build the backend image via bake so it restores from the shared gha
      # layer cache when warm (the `build` job also writes it). Now that e2e is
      # un-gated it usually starts before `build`, so the cache is often cold and
      # this step rebuilds — `compose up` below then finds the loaded images and
      # skips its own build; on a cache/name miss it simply rebuilds — slower,
      # never broken.
      - name: Build the stack image (gha layer cache)
        uses: docker/bake-action@v7
        with:
          files: |
            docker-compose.yml
            frontend/e2e/compose.e2e.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=library-image
      - name: Start the backend stack
        run: docker compose up -d db migrate api worker
      - name: Wait for the API
        run: timeout 180 bash -c 'until curl -fsS http://localhost:8000/healthz; do sleep 3; done'
      - name: Create the e2e user
        run: |
          echo 'e2e-password-123' | docker compose exec -T api \
            library user add e2e --display-name "E2E" --password-stdin
      - name: Create the e2e admin user
        run: |
          echo 'e2e-admin-password-123' | docker compose exec -T api \
            library user add e2e-admin --display-name "E2E Admin" --admin --password-stdin
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Build the frontend
        working-directory: frontend
        run: npm run build-only
      - name: Serve the build (vite preview proxies /api to :8000)
        working-directory: frontend
        run: |
          nohup npm run preview -- --port 4173 --strictPort > preview.log 2>&1 &
          timeout 60 bash -c 'until curl -fsS http://localhost:4173 > /dev/null; do sleep 1; done'
      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Backend logs on failure
        if: failure()
        run: docker compose logs api worker
      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  # Deployment smoke test: the exact production compose file boots to a
  # healthy stack and a working login (W17 acceptance).
  compose-smoke:
    runs-on: ubuntu-latest
    env:
      # The runner talks plain HTTP to :8000; Secure cookies would be
      # dropped by curl's cookie jar. Production keeps the default (true).
      LIBRARY_COOKIE_SECURE: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build the stack image (gha layer cache)
        uses: docker/bake-action@v7
        with:
          files: docker-compose.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=library-image
      - name: Start the full stack
        run: docker compose up -d
      - name: Wait for the API
        run: timeout 180 bash -c 'until curl -fsS http://localhost:8000/healthz; do sleep 3; done'
      - name: Wait for container healthchecks (api, worker, db)
        run: |
          timeout 120 bash -c '
            until [ "$(docker inspect -f "{{.State.Health.Status}}" \
              $(docker compose ps -q api) $(docker compose ps -q worker) $(docker compose ps -q db) \
              | sort -u)" = healthy ]; do sleep 3; done'
      - name: SPA shell is served at /
        run: curl -fsS http://localhost:8000/ | grep -q '<div id="app">'
      - name: Create a user
        run: |
          echo 'smoke-password-123' | docker compose exec -T api \
            library user add smoke --display-name "Smoke" --password-stdin
      - name: Log in (cookie) and list documents
        run: |
          curl -fsS -c cookies.txt -H 'Content-Type: application/json' \
            -d '{"username": "smoke", "password": "smoke-password-123"}' \
            http://localhost:8000/api/auth/login
          curl -fsS -b cookies.txt http://localhost:8000/api/documents | grep -q '"items"'
      - name: Logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v

  # Build the published image, gated on the backend + frontend test jobs so it
  # can bake in their real coverage numbers (the unified coverage-summary.json
  # the admin views read). Image readiness is unaffected in practice: promote
  # already waits for the full green suite (incl. e2e + compose-smoke). Pushes
  # the immutable :sha tag on main (the rollback artifact and the source the
  # promote step retags); on branches it skips the push and only warms the
  # cache. This job is the sole writer of the `library-image` layer-cache scope
  # that the e2e and compose-smoke bake builds read from.
  build:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      # Pull the coverage reports the test jobs uploaded; missing artifacts are
      # tolerated so the build never fails for want of coverage (the script then
      # records a null pct for that side).
      - name: Download backend coverage JSON
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: backend-coverage-json
          path: coverage-artifacts/backend
      - name: Download frontend coverage report
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: frontend-coverage-html
          path: coverage-artifacts/frontend
      - name: Generate the unified coverage summary
        # Pure-stdlib script; the runner's system python3 is enough (no uv).
        run: |
          python3 scripts/coverage_summary.py \
            --backend-json coverage-artifacts/backend/coverage.json \
            --frontend-json coverage-artifacts/frontend/coverage-summary.json \
            --git-sha "$GIT_SHA" \
            --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output coverage-summary.json
          cat coverage-summary.json
        env:
          GIT_SHA: ${{ github.sha }}
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (push :sha on main; warm the cache on branches)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/johnmathews/library:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=library-image
          cache-to: type=gha,scope=library-image,mode=max

  # Promote the tested build to :latest — a registry-side retag of the :sha
  # image (no rebuild, no pull, ~seconds), gated on the full green suite.
  # :latest is what production deploys, so it only moves once backend, frontend,
  # e2e and compose-smoke have all passed.
  promote:
    needs: [build, backend, frontend, e2e, compose-smoke]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Retag :sha as :latest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/johnmathews/library:latest \
            "ghcr.io/johnmathews/library:${GITHUB_SHA}"

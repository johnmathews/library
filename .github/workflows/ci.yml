name: CI

on:
  push:
    branches: [main, "eng-**"]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install OCR system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-nld tesseract-ocr-eng ghostscript unpaper
      - name: Install dependencies
        run: uv sync --locked
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test with coverage
        run: |
          uv run coverage run -m pytest
          uv run coverage report

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Test
        run: npm run test:unit -- --run
      - name: Build
        run: npm run build
      - name: Check no licence-restricted GOV.UK assets in build
        run: npm run check:assets

  e2e:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    env:
      # Both compose files for every compose invocation (up/exec/logs/down).
      COMPOSE_FILE: docker-compose.yml:frontend/e2e/compose.e2e.yml
      E2E_BASE_URL: http://localhost:4173
    steps:
      - uses: actions/checkout@v4
      - name: Start the backend stack
        run: docker compose up -d --build db migrate api worker
      - name: Wait for the API
        run: timeout 180 bash -c 'until curl -fsS http://localhost:8000/healthz; do sleep 3; done'
      - name: Create the e2e user
        run: |
          echo 'e2e-password-123' | docker compose exec -T api \
            library user add e2e --display-name "E2E" --password-stdin
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium webkit
      - name: Build the frontend
        working-directory: frontend
        run: npm run build-only
      - name: Serve the build (vite preview proxies /api to :8000)
        working-directory: frontend
        run: |
          nohup npm run preview -- --port 4173 --strictPort > preview.log 2>&1 &
          timeout 60 bash -c 'until curl -fsS http://localhost:4173 > /dev/null; do sleep 1; done'
      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Backend logs on failure
        if: failure()
        run: docker compose logs api worker
      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  # Deployment smoke test: the exact production compose file boots to a
  # healthy stack and a working login (W17 acceptance).
  compose-smoke:
    runs-on: ubuntu-latest
    env:
      # The runner talks plain HTTP to :8000; Secure cookies would be
      # dropped by curl's cookie jar. Production keeps the default (true).
      LIBRARY_COOKIE_SECURE: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Start the full stack
        run: docker compose up -d --build
      - name: Wait for the API
        run: timeout 180 bash -c 'until curl -fsS http://localhost:8000/healthz; do sleep 3; done'
      - name: Wait for container healthchecks (api, worker, db)
        run: |
          timeout 120 bash -c '
            until [ "$(docker inspect -f "{{.State.Health.Status}}" \
              $(docker compose ps -q api) $(docker compose ps -q worker) $(docker compose ps -q db) \
              | sort -u)" = healthy ]; do sleep 3; done'
      - name: SPA shell is served at /
        run: curl -fsS http://localhost:8000/ | grep -q '<div id="app">'
      - name: Create a user
        run: |
          echo 'smoke-password-123' | docker compose exec -T api \
            library user add smoke --display-name "Smoke" --password-stdin
      - name: Log in (cookie) and list documents
        run: |
          curl -fsS -c cookies.txt -H 'Content-Type: application/json' \
            -d '{"username": "smoke", "password": "smoke-password-123"}' \
            http://localhost:8000/api/auth/login
          curl -fsS -b cookies.txt http://localhost:8000/api/documents | grep -q '"items"'
      - name: Logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v

  docker:
    needs: [backend, frontend, e2e, compose-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/johnmathews/library:latest
            ghcr.io/johnmathews/library:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
